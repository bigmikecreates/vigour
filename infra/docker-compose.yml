services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vigour
      POSTGRES_PASSWORD: vigour
      POSTGRES_DB: vigour
    ports:
      - "5432:5432"
    volumes:
      - vigour_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  vigour_pg:
